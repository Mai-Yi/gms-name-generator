<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GMS 搬蛋小助手</title>
  <base href="./">
  <style>
    body { margin: 0; overflow: hidden; background: #F5E6F0; }
    .crystal-frame-wrap { position: relative; width: 100%; height: 100vh; }
    .crystal-frame-wrap iframe { width: 100%; height: 100%; border: 0; display: block; }
    .crystal-back-link {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100;
      padding: 8px 14px;
      font-size: 13px;
      color: #7B1FA2;
      background: rgba(255,255,255,0.95);
      border: 2px solid #CE93D8;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .crystal-back-link:hover { background: rgba(248,187,208,0.5); border-color: #B39DDB; }
  </style>
</head>
<body>
  <a href="index.html" class="crystal-back-link">返回工具集</a>
  <div class="crystal-frame-wrap">
    <iframe id="crystalFrame" src="index.html#crystal" title="GMS 搬蛋小助手"></iframe>
  </div>
  <script>
    (function(){
      const h = location.hash;
      const iframe = document.getElementById('crystalFrame');
      if (iframe) iframe.src = 'index.html' + (h || '#crystal');
    })();
  </script>
</body>
</html>
